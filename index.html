<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>노은</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 배너: 위젯이 아니라 항상 최상단에 고정되는 요소예요 -->
  <div class="site-banner" id="siteBanner">
    <div class="site-banner-scrim"></div>
    <div class="site-banner-sub" id="bannerSub" contenteditable="false" data-placeholder="배너 부제목을 적어주세요"></div>
    <button class="btn small banner-edit-btn" id="bannerEditBtn" style="display:none;">배너 사진/문구 편집</button>
  </div>

  <div class="site-topbar">
    <div class="site-name" id="siteName" contenteditable="false">우리의 갠홈</div>
    <div class="topbar-actions">
      <span class="lock-badge" id="lockBadge">🔒 보기 전용</span>
      <button class="btn small" id="globalStyleBtn">🎨 전체 스타일</button>
      <button class="btn small" id="lockBtn">잠금 해제</button>
    </div>
  </div>

  <div class="dashboard" id="dashboard">
    <!-- 위젯이 JS로 렌더링됩니다 -->
  </div>

  <div class="add-widget-bar" id="addWidgetBar" style="display:none;">
    <span style="align-self:center;font-size:.8rem;color:var(--ink-soft);">위젯 추가</span>
    <button class="btn small" data-add="dday">디데이</button>
    <button class="btn small" data-add="calendar">캘린더</button>
    <button class="btn small" data-add="gallery">갤러리</button>
    <button class="btn small" data-add="embed">외부링크 임베드</button>
    <button class="btn small" data-add="backup">백업 카드함</button>
    <button class="btn small" data-add="music">음악 플레이어</button>
    <button class="btn small" data-add="story">썰</button>
  </div>

  <div id="modalRoot"></div>

  <!-- Firebase (compat SDK) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
