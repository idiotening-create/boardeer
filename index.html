<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>노은</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 홈페이지 전체 배경 이미지 레이어 (배너와 별개, 페이지 전체 뒤에 깔림) -->
  <div class="bg-image-layer" id="bgImageLayer"></div>

  <!-- 배너: 제목/잠금/테마 버튼이 전부 여기 하단에 함께 있어요 (별도 제목바 없음) -->
  <div class="site-banner" id="siteBanner">
    <div class="site-banner-scrim"></div>
    <div class="banner-bottom">
      <div class="banner-bottom-left">
        <div class="site-name" id="siteName" contenteditable="false">노은</div>
      </div>
      <div class="banner-bottom-right">
        <span class="lock-badge" id="lockBadge">🔒 보기 전용</span>
        <button class="btn small" id="globalStyleBtn">🎨 테마 편집</button>
        <button class="btn small banner-edit-btn" id="bannerEditBtn" style="display:none;">배너 이미지</button>
        <button class="btn small bg-edit-btn" id="bgEditBtn" style="display:none;">배경 이미지</button>
        <button class="btn small" id="lockBtn">잠금 해제</button>
      </div>
    </div>
  </div>

  <!-- 고정 레이아웃: 정해진 영역이 항상 이 구성대로 보여요. 위젯 제목은 전부 없앰(애플 위젯 스타일) -->
  <div class="board">

    <div class="row row-images">
      <div class="w-card w-images" id="cardImages"></div>
    </div>

    <div class="row row-strip">
      <div class="w-card w-docs" id="cardDocs">
        <div class="doc-list" id="docList"></div>
        <div class="w-edit-row" id="docAddWrap"></div>
      </div>
      <div class="row-strip-right">
        <div class="w-card w-music" id="cardMusic"></div>
        <div class="w-card w-dday" id="cardDday">
          <div class="w-body scroll" id="ddayBody"></div>
          <div class="w-edit-row" id="ddayAddWrap"></div>
        </div>
      </div>
    </div>

    <div class="row row-2">
      <div class="w-card w-guestbook" id="cardGuestbook">
        <div class="w-body scroll" id="guestbookBody"></div>
        <div class="gb-form" id="guestbookForm">
          <input type="text" id="gbName" placeholder="이름">
          <textarea id="gbMsg" placeholder="메시지를 남겨주세요"></textarea>
          <button class="btn small primary" id="gbSubmit">남기기</button>
        </div>
      </div>
      <div class="w-card w-calendar" id="cardCalendar"></div>
    </div>

    <div class="row row-3">
      <div class="w-card w-gallery" id="cardGallery"></div>
    </div>

    <div class="row row-4">
      <div class="w-card w-sessions" id="cardSessions">
        <div class="session-grid" id="sessionGrid"></div>
        <div class="w-edit-row" id="sessionAddWrap"></div>
      </div>
      <div class="w-card w-checklist" id="cardChecklist">
        <div class="checklist" id="checklistBody"></div>
        <div class="check-add-row" id="checklistAddWrap" style="display:none;"></div>
      </div>
    </div>

  </div>

  <div id="modalRoot"></div>

  <!-- Firebase (compat SDK) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
